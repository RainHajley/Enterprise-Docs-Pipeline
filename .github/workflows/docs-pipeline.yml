name: Docs Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Asciidoctor and PDF Generator
        run: |
          gem install asciidoctor asciidoctor-pdf

      - name: Build Documentation (HTML & PDF Variants)
        run: |
          mkdir -p build/public/html build/public/pdf build/internal/html build/internal/pdf
          
          # Build Public Variants (HTML + PDF)
          asciidoctor -a profile=public -D build/public/html docs/index.adoc
          asciidoctor-pdf -a profile=public -D build/public/pdf docs/index.adoc
          
          # Build Internal Variants (HTML + PDF)
          asciidoctor -a profile=internal -D build/internal/html docs/index.adoc
          asciidoctor-pdf -a profile=internal -D build/internal/pdf docs/index.adoc
          
          # Copy Landing Page into Build Root
          cp index.html build/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy-to-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
