name: Docs Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Asciidoctor and PDF Generator
        run: |
          gem install asciidoctor asciidoctor-pdf

      - name: Build Documentation (Public & Internal Variants)
        run: |
          mkdir -p build/public build/internal

          # Build Public Variant
          asciidoctor -a profile=public -D build/public docs/index.adoc

          # Build Internal Variant
          asciidoctor -a profile=internal -D build/internal docs/index.adoc

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-documentation
          path: build/
